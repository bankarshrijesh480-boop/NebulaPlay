<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- ========================= -->
    <!-- Basic Meta -->
    <!-- ========================= -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <title>NebulaPlay | AAA Cloud Gaming Platform</title>

    <meta
      name="description"
      content="NebulaPlay is a next-generation AAA cloud gaming platform delivering ultra-low latency gameplay, RTX graphics, and instant access to your favorite games."
    />

    <meta
      name="keywords"
      content="NebulaPlay, Cloud Gaming, RTX, GeForce NOW, Xbox Cloud Gaming, PlayStation, Unreal Engine, Gaming Platform"
    />

    <meta name="author" content="NebulaPlay" />
    <meta name="theme-color" content="#050816" />
    <meta name="color-scheme" content="dark" />

    <!-- ========================= -->
    <!-- Open Graph -->
    <!-- ========================= -->

    <meta property="og:type" content="website" />
    <meta property="og:title" content="NebulaPlay" />

    <meta
      property="og:description"
      content="AAA Cloud Gaming Platform built with React, Vite and Tailwind CSS."
    />

    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:url" content="/" />

    <!-- ========================= -->
    <!-- Twitter -->
    <!-- ========================= -->

    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="NebulaPlay | AAA Cloud Gaming"
    />

    <meta
      name="twitter:description"
      content="Play AAA games instantly in the cloud."
    />

    <meta
      name="twitter:image"
      content="/og-image.jpg"
    />

    <!-- ========================= -->
    <!-- Fonts -->
    <!-- ========================= -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <!-- ========================= -->
    <!-- Favicon -->
    <!-- ========================= -->

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
